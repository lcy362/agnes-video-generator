<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agnes Video Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  .animate-spin { animation: spin 1s linear infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .animate-pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
  .step-line { transition: all 0.5s ease; }
  pre { white-space: pre-wrap; word-break: break-all; }
  .tab-active { background: linear-gradient(135deg, #7c3aed, #db2777); color: white; }
  .tab-inactive { background: #1f2937; color: #d1d5db; }
  .tab-inactive:hover { background: #374151; }
  .collapse-header { cursor: pointer; user-select: none; }
  .collapse-body { overflow: hidden; transition: max-height 0.3s ease; }
</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

<div class="max-w-4xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="text-center mb-10 relative">
    <div class="absolute right-0 top-0">
      <select id="lang-selector" onchange="switchLang(this.value)" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-purple-500 transition cursor-pointer">
        <option value="zh">🇨🇳 中文</option>
        <option value="en">🇺🇸 English</option>
        <option value="ru">🇷🇺 Русский</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="ko">🇰🇷 한국어</option>
        <option value="ms">🇲🇾 Bahasa Melayu</option>
        <option value="id">🇮🇩 Bahasa Indonesia</option>
      </select>
    </div>
    <h1 class="text-4xl font-bold bg-gradient-to-r from-purple-400 via-pink-400 to-orange-400 bg-clip-text text-transparent">
      Agnes Video Generator
    </h1>
    <p class="text-gray-400 mt-2" data-i18n="subtitle">AI 视频，一键生成</p>
  </div>

  <!-- API Key -->
  <div id="apikey-section" class="bg-gray-900 rounded-2xl p-6 mb-6 border border-gray-800">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-lg font-semibold text-purple-300" data-i18n="apiKeyTitle">API Key 配置</h2>
      <span id="apikey-status" class="text-xs px-2 py-1 rounded-full bg-gray-800 text-gray-400" data-i18n="apiKeyNotConfigured">未配置</span>
    </div>
    <div class="flex gap-3">
      <input id="apikey-input" type="password" data-i18n-placeholder="apiKeyPlaceholder" placeholder="输入 Agnes API Key" class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
      <button id="apikey-save" class="px-5 py-2.5 bg-purple-600 hover:bg-purple-500 rounded-lg text-sm font-medium transition" data-i18n="save">保存</button>
    </div>
  </div>

  <!-- Main Tabs: 新建任务 / 任务列表 -->
  <div class="flex gap-2 mb-6">
    <button onclick="switchMainTab('create')" id="mtab-create" class="mtab-btn px-5 py-2.5 rounded-lg text-sm font-medium tab-active transition" data-i18n="tabCreate">新建任务</button>
    <button onclick="switchMainTab('list')" id="mtab-list" class="mtab-btn px-5 py-2.5 rounded-lg text-sm font-medium tab-inactive transition" data-i18n="tabList">任务列表</button>
  </div>

  <!-- ═══════════ Create Panel ═══════════ -->
  <div id="panel-create">

    <!-- Task Type Tabs -->
    <div class="flex gap-2 mb-4">
      <button onclick="switchTaskType('simple')" id="ttype-simple" class="ttype-btn flex-1 px-4 py-3 rounded-xl text-sm font-medium tab-inactive transition text-center">
        <span class="text-lg">🎬</span><br><span data-i18n="ttSimple">简单视频</span>
      </button>
      <button onclick="switchTaskType('creative')" id="ttype-creative" class="ttype-btn flex-1 px-4 py-3 rounded-xl text-sm font-medium tab-active transition text-center">
        <span class="text-lg">🎥</span><br><span data-i18n="ttCreative">创意长视频</span>
      </button>
      <button onclick="switchTaskType('manuscript')" id="ttype-manuscript" class="ttype-btn flex-1 px-4 py-3 rounded-xl text-sm font-medium tab-inactive transition text-center">
        <span class="text-lg">📝</span><br><span data-i18n="ttManuscript">稿件长视频</span>
      </button>
    </div>

    <!-- ═══════ Tab 1: Simple Video ═══════ -->
    <div id="form-simple" class="hidden">
      <div class="bg-gray-900 rounded-2xl p-6 mb-4 border border-gray-800">
        <h2 class="text-lg font-semibold text-purple-300 mb-4" data-i18n="simpleSettings">简单视频设置</h2>

        <div class="mb-4">
          <label class="block text-sm text-gray-400 mb-1.5"><span data-i18n="promptLabel">视频描述</span> (prompt) <span class="text-red-400">*</span></label>
          <textarea id="s_prompt" rows="3" data-i18n-placeholder="promptPlaceholder" placeholder="描述你想要的视频画面..." class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition resize-y"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1.5" data-i18n="genMode">生成模式</label>
            <select id="s_mode" onchange="onSimpleModeChange()" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
              <option value="t2v" data-i18n="modeT2v">文生视频</option>
              <option value="i2v" data-i18n="modeI2v">图生视频</option>
              <option value="keyframes" data-i18n="modeKeyframesSimple">关键帧</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1.5" data-i18n="duration">时长</label>
            <select id="s_duration" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
              <option value="5">5s</option>
              <option value="10">10s</option>
              <option value="15">15s</option>
              <option value="18">18s</option>
              <option value="20">20s</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1.5" data-i18n="resolution">分辨率</label>
            <select id="s_resolution" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
              <option value="768x1152" data-i18n="resPortrait">竖屏 9:16</option>
              <option value="1152x768" data-i18n="resLandscape">横屏 16:9</option>
              <option value="1024x1024" data-i18n="resSquare">方形 1:1</option>
            </select>
          </div>
        </div>

        <!-- Reference Image (i2v / keyframes) -->
        <div id="s_ref_section" class="hidden mb-4">
          <label class="block text-sm text-gray-400 mb-1.5" data-i18n="refImageSimple">参考图</label>
          <div class="flex items-center gap-4">
            <label class="cursor-pointer px-4 py-2.5 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg text-sm transition inline-block">
              <span data-i18n="chooseImage">选择参考图</span>
              <input id="s_ref_image" type="file" accept="image/*" class="hidden" onchange="updateLabel('s_ref_image','s_ref_name')">
            </label>
            <span id="s_ref_name" class="text-sm text-gray-500" data-i18n="notSelected">未选择</span>
          </div>
        </div>

        <!-- End Frame Image (keyframes only) -->
        <div id="s_end_section" class="hidden mb-4">
          <label class="block text-sm text-gray-400 mb-1.5" data-i18n="endFrameImage">尾帧图</label>
          <div class="flex items-center gap-4">
            <label class="cursor-pointer px-4 py-2.5 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg text-sm transition inline-block">
              <span data-i18n="chooseImage">选择参考图</span>
              <input id="s_end_image" type="file" accept="image/*" class="hidden" onchange="updateLabel('s_end_image','s_end_name')">
            </label>
            <span id="s_end_name" class="text-sm text-gray-500" data-i18n="notSelected">未选择</span>
          </div>
        </div>

        <!-- Advanced (collapsible) -->
        <div class="border-t border-gray-800 pt-4 mt-4">
          <div class="collapse-header flex items-center justify-between" onclick="toggleCollapse('s_advanced')">
            <span class="text-sm text-gray-400" data-i18n="advancedSettings">高级设置</span>
            <span id="s_advanced-arrow" class="text-gray-500 text-xs">▶</span>
          </div>
          <div id="s_advanced" class="collapse-body hidden mt-3">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm text-gray-400 mb-1.5">Seed (<span data-i18n="optional">可选</span>)</label>
                <input id="s_seed" type="number" placeholder="留空随机" data-i18n-placeholder="seedPlaceholder" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
              </div>
              <div>
                <label class="block text-sm text-gray-400 mb-1.5">Negative Prompt (<span data-i18n="optional">可选</span>)</label>
                <input id="s_negative" data-i18n-placeholder="negativePlaceholder" placeholder="排除不希望出现的元素" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
              </div>
            </div>
          </div>
        </div>
      </div>

      <button id="btn-simple" onclick="submitSimple()" class="w-full py-3.5 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 rounded-xl text-base font-semibold transition disabled:opacity-50 disabled:cursor-not-allowed" data-i18n="startGenerate">
        开始生成视频
      </button>
    </div>

    <!-- ═══════ Tab 2: Creative Video ═══════ -->
    <div id="form-creative">
      <div class="bg-gray-900 rounded-2xl p-6 mb-4 border border-gray-800">
        <h2 class="text-lg font-semibold text-purple-300 mb-4" data-i18n="creativeSettings">创意设置</h2>

        <div class="mb-4">
          <label class="block text-sm text-gray-400 mb-1.5" data-i18n="taskName">任务名称</label>
          <input id="c_name" data-i18n-placeholder="taskNamePlaceholder" placeholder="可选，留空自动生成" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
        </div>

        <div class="mb-4">
          <label class="block text-sm text-gray-400 mb-1.5"><span data-i18n="ideaLabel">创意描述</span> (idea) <span class="text-red-400">*</span></label>
          <textarea id="c_idea" rows="4" data-i18n-placeholder="ideaPlaceholder" placeholder="描述你心中的故事、场景和角色..." class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition resize-y"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1.5" data-i18n="userRequirement">用户要求</label>
            <input id="c_requirement" value="3个场景，每个场景5秒，电影质感" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1.5" data-i18n="visualStyle">视觉风格</label>
            <input id="c_style" value="电影质感写实风格" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
          </div>
        </div>
      </div>

      <!-- Advanced Config -->
      <div class="bg-gray-900 rounded-2xl p-6 mb-4 border border-gray-800">
        <h2 class="text-lg font-semibold text-purple-300 mb-4" data-i18n="advancedSettings">高级设置</h2>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1.5" data-i18n="chainingMode">串联模式</label>
            <select id="c_chaining" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
              <option value="keyframes" data-i18n="modeKeyframes">keyframes (推荐)</option>
              <option value="ti2vid" data-i18n="modeTi2vid">ti2vid (过渡帧)</option>
              <option value="none" data-i18n="modeNone">none (独立场景)</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1.5" data-i18n="resolution">分辨率</label>
            <select id="c_resolution" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
              <option value="768x1152" data-i18n="resPortrait">竖屏 9:16</option>
              <option value="1152x768" data-i18n="resLandscape">横屏 16:9</option>
              <option value="1024x1024" data-i18n="resSquare">方形 1:1</option>
            </select>
          </div>
        </div>

        <!-- Reference Image -->
        <div class="mb-4">
          <label class="block text-sm text-gray-400 mb-1.5" data-i18n="referenceImage">参考图 (可选)</label>
          <div class="flex items-center gap-4">
            <label class="cursor-pointer px-4 py-2.5 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg text-sm transition inline-block">
              <span data-i18n="chooseImage">选择参考图</span>
              <input id="c_ref_image" type="file" accept="image/*" class="hidden" onchange="updateLabel('c_ref_image','c_ref_name')">
            </label>
            <span id="c_ref_name" class="text-sm text-gray-500" data-i18n="notSelected">未选择</span>
          </div>
          <p class="text-xs text-gray-500 mt-2" data-i18n="refDescription">可选。提供后所有场景将以该图为视觉锚点；不提供则自动从故事中生成角色参考图</p>
        </div>

        <!-- End Frames -->
        <div class="mb-4">
          <div class="flex items-center justify-between mb-3">
            <label class="text-sm text-gray-400" data-i18n="customEndFrames">自定义尾帧 (可选)</label>
            <div class="flex gap-3">
              <label class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer">
                <input type="checkbox" id="c_use_end_frames" onchange="toggleCEndFrames()" class="rounded bg-gray-800 border-gray-600">
                <span data-i18n="enableCustomEndFrames">启用自定义尾帧</span>
              </label>
              <label class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer">
                <input type="checkbox" id="c_gen_end_from_ref" onchange="toggleCEndFrameMode()" class="rounded bg-gray-800 border-gray-600">
                <span data-i18n="genEndFramesFromRef">基于参考图生成尾帧 (i2i)</span>
              </label>
            </div>
          </div>
          <div id="c-end-frames-container" class="hidden space-y-2">
            <p class="text-xs text-gray-500 mb-2" data-i18n="endFrameDesc">每个场景一张尾帧图，按顺序对应。多余场景自动生成尾帧。</p>
            <div id="c-end-frame-inputs">
              <div class="flex items-center gap-3 mb-2">
                <span class="text-xs text-gray-500 w-16" data-i18n="scene_">场景</span>
                <input type="file" accept="image/*" class="end-frame-file flex-1 text-sm text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-sm file:bg-gray-700 file:text-gray-200 hover:file:bg-gray-600">
              </div>
            </div>
            <button onclick="addCEndFrameInput()" class="text-xs text-purple-400 hover:text-purple-300 mt-2" data-i18n="addEndFrame">+ 添加尾帧</button>
          </div>
        </div>
      </div>

      <!-- Audio Config (Creative) -->
      <div class="bg-gray-900 rounded-2xl p-6 mb-4 border border-gray-800">
        <div class="collapse-header flex items-center justify-between" onclick="toggleCollapse('c_audio_body')">
          <h2 class="text-lg font-semibold text-purple-300" data-i18n="audioConfig">音频与字幕配置</h2>
          <span id="c_audio_body-arrow" class="text-gray-500 text-xs">▶</span>
        </div>
        <div id="c_audio_body" class="collapse-body hidden mt-4">
          <div class="flex items-center gap-3 mb-4">
            <label class="flex items-center gap-2 text-sm text-gray-300 cursor-pointer">
              <input type="checkbox" id="c_audio_enabled" checked class="rounded bg-gray-800 border-gray-600">
              <span data-i18n="enableNarration">启用旁白配音</span>
            </label>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
              <label class="block text-sm text-gray-400 mb-1.5" data-i18n="voiceRole">语音角色</label>
              <select id="c_voice" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
                <option value="zh-CN-XiaoxiaoNeural">Xiaoxiao (温柔女声)</option>
                <option value="zh-CN-YunyangNeural">Yunyang (沉稳男声)</option>
                <option value="zh-CN-XiaoyiNeural">Xiaoyi (活泼女声)</option>
                <option value="zh-CN-YunxiNeural">Yunxi (年轻男声)</option>
              </select>
            </div>
            <div>
              <label class="block text-sm text-gray-400 mb-1.5" data-i18n="speechRate">语速</label>
              <select id="c_rate" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
                <option value="-30%">-30% (慢)</option>
                <option value="-15%">-15%</option>
                <option value="+0%" selected data-i18n="rateNormal">正常</option>
                <option value="+15%">+15%</option>
                <option value="+30%">+30% (快)</option>
              </select>
            </div>
          </div>
          <!-- Subtitle Style -->
          <div class="border-t border-gray-800 pt-4">
            <p class="text-sm text-gray-400 mb-3" data-i18n="subtitleStyle">字幕样式</p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
              <div>
                <label class="block text-xs text-gray-500 mb-1" data-i18n="subFont">字体</label>
                <input id="c_sub_font" value="STHeitiMedium.ttc" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs focus:outline-none focus:border-purple-500">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1" data-i18n="subColor">颜色</label>
                <input id="c_sub_color" value="white" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs focus:outline-none focus:border-purple-500">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1" data-i18n="subSize">字号</label>
                <input id="c_sub_fontsize" type="number" value="48" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs focus:outline-none focus:border-purple-500">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1" data-i18n="subPosition">位置</label>
                <select id="c_sub_position" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs focus:outline-none focus:border-purple-500">
                  <option value="bottom" data-i18n="posBottom">底部</option>
                  <option value="top" data-i18n="posTop">顶部</option>
                </select>
              </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-3">
              <div>
                <label class="block text-xs text-gray-500 mb-1" data-i18n="subStrokeColor">描边色</label>
                <input id="c_sub_stroke_color" value="black" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs focus:outline-none focus:border-purple-500">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1" data-i18n="subStrokeWidth">描边宽</label>
                <input id="c_sub_stroke_width" type="number" value="2" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs focus:outline-none focus:border-purple-500">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1" data-i18n="subBgColor">背景色</label>
                <input id="c_sub_bg_color" value="black@0.5" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs focus:outline-none focus:border-purple-500">
              </div>
            </div>
          </div>
        </div>
      </div>

      <button id="btn-creative" onclick="submitCreative()" class="w-full py-3.5 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 rounded-xl text-base font-semibold transition disabled:opacity-50 disabled:cursor-not-allowed" data-i18n="startGenerate">
        开始生成视频
      </button>
    </div>

    <!-- ═══════ Tab 3: Manuscript Video ═══════ -->
    <div id="form-manuscript" class="hidden">
      <div class="bg-gray-900 rounded-2xl p-6 mb-4 border border-gray-800">
        <h2 class="text-lg font-semibold text-purple-300 mb-4" data-i18n="manuscriptSettings">稿件设置</h2>

        <div class="mb-4">
          <label class="block text-sm text-gray-400 mb-1.5" data-i18n="taskName">任务名称</label>
          <input id="m_name" data-i18n-placeholder="taskNamePlaceholder" placeholder="可选，留空自动生成" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-purple-500 transition">
        </div>

        <div class="mb-4">
          <label class="block text-sm text-gray-400 mb-1.5"><span data-i18n="manuscriptText">稿件正文</span> <span class="text-red-400">*</span></label>

let currentLang = 'zh';

function t(key) {
  let val = (T[currentLang] && T[currentLang][key]);
  if (val === undefined) val = (T['zh'] && T['zh'][key]) || key;
  return val;
}

function applyLanguage(lang) {
  currentLang = lang || 'zh';
  try { localStorage.setItem('lang', currentLang); } catch(e) {}
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : currentLang;
  document.getElementById('lang-selector').value = currentLang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
}

function switchLang(lang) { applyLanguage(lang); }

function showToast(msg, duration = 2500) {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-2.5 rounded-xl text-sm font-medium shadow-lg transition-all duration-300 opacity-0 translate-y-4 z-50';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.className = el.className.replace(/opacity-0 translate-y-4/, 'opacity-100 translate-y-0');
  el.className = el.className.replace(/bg-\S+ text-\S+/, '');
  el.className += ' bg-yellow-600 text-white';
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => {
    el.className = el.className.replace(/opacity-100 translate-y-0/, 'opacity-0 translate-y-4');
  }, duration);
}

// ═══════════════════════════════════════════════════
// Progress
// ═══════════════════════════════════════════════════

function getStepsForType(taskType) {
  return STEPS[taskType] || STEPS.creative;
}

function showProgress(taskId, dirName) {
  const panel = document.getElementById('progress-panel');
  panel.classList.remove('hidden');
  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('btn-stop').classList.remove('hidden');
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('progress-pct').textContent = '0%';

  const steps = getStepsForType(currentTaskType);
  document.getElementById('steps-container').innerHTML = steps.map(s => `
    <div class="step-item flex items-center gap-3 text-sm" data-step="${s.key}">
      <span class="step-icon w-5 h-5 flex items-center justify-center rounded-full bg-gray-800 text-xs">○</span>
      <span class="step-label text-gray-500">${t(s.labelKey)}</span>
    </div>
  `).join('');

  const dirInfo = dirName ? `<br><span class="text-gray-600 text-xs">${t('dir')}: <span class="font-mono">${dirName}</span></span>` : '';
  document.getElementById('progress-message').innerHTML = `<span class="text-yellow-400">${t('watchLog')}</span><br><span class="text-gray-500">${t('task_')}: ${taskId}</span>${dirInfo}`;
}

function connectWS(taskId) {
  if (ws) { ws.close(); ws = null; }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws/' + taskId);

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type !== 'progress') return;

    const step = msg.step;
    const pct = Math.round(msg.progress * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-message').textContent = msg.message;

    const stepEl = document.querySelector(`.step-item[data-step="${step}"]`);
    if (stepEl) {
      const icon = stepEl.querySelector('.step-icon');
      const label = stepEl.querySelector('.step-label');
      if (msg.status === 'running') {
        icon.textContent = '◉';
        icon.className = 'step-icon w-5 h-5 flex items-center justify-center rounded-full bg-purple-900 text-purple-300 text-xs animate-pulse-dot';
        label.className = 'step-label text-purple-300';
      } else if (msg.status === 'completed') {
        icon.textContent = '✓';
        icon.className = 'step-icon w-5 h-5 flex items-center justify-center rounded-full bg-green-900 text-green-300 text-xs';
        label.className = 'step-label text-green-400';
      } else if (msg.status === 'failed') {
        icon.textContent = '✗';
        icon.className = 'step-icon w-5 h-5 flex items-center justify-center rounded-full bg-red-900 text-red-300 text-xs';
        label.className = 'step-label text-red-400';
      }
    }

    // Mark all prior steps as completed when a step is running
    if (msg.status === 'running') {
      const steps = getStepsForType(currentTaskType);
      const idx = steps.findIndex(s => s.key === step);
      if (idx > 0) {
        for (let i = 0; i < idx; i++) {
          const el = document.querySelector(`.step-item[data-step="${steps[i].key}"]`);
          if (el) {
            el.querySelector('.step-icon').textContent = '✓';
            el.querySelector('.step-icon').className = 'step-icon w-5 h-5 flex items-center justify-center rounded-full bg-green-900 text-green-300 text-xs';
            el.querySelector('.step-label').className = 'step-label text-green-400';
          }
        }
      }
    }

    if (step === 'done' && msg.status === 'completed') {
      showResult(msg.data && msg.data.final_video);
      clearRunning();
    }

    if (step === 'error') {
      clearRunning();
      document.getElementById('progress-message').innerHTML = `
        <div class="p-4 bg-red-950 border border-red-800 rounded-lg space-y-2">
          <p class="text-red-400 font-medium">${t('genFailed')}</p>
          <p class="text-gray-400 text-xs">${msg.message || t('genFailedMsg')}</p>
          <button onclick="switchMainTab('list')" class="mt-1 text-xs px-3 py-1.5 bg-red-800 hover:bg-red-700 text-red-100 rounded-lg transition">${t('gotoResume')}</button>
        </div>`;
    }
  };

  ws.onclose = (e) => {
    ws = null;
    if (isTaskRunning && e.code !== 1000) {
      clearRunning();
      document.getElementById('progress-message').innerHTML = `
        <div class="p-4 bg-yellow-950 border border-yellow-800 rounded-lg space-y-2">
          <p class="text-yellow-400 font-medium">${t('connLost')}</p>
          <p class="text-gray-400 text-xs">${t('connLostMsg')}</p>
          <button onclick="switchMainTab('list')" class="mt-1 text-xs px-3 py-1.5 bg-yellow-800 hover:bg-yellow-700 text-yellow-100 rounded-lg transition">${t('gotoList')}</button>
        </div>`;
    }
  };

  ws.onerror = (e) => {
    if (isTaskRunning) {
      document.getElementById('progress-message').textContent = t('reconnecting');
      setTimeout(() => { if (isTaskRunning && !ws) connectWS(taskId); }, 3000);
    }
  };
}

function showResult(videoPath) {
  document.getElementById('result-area').classList.remove('hidden');
  if (videoPath && currentTaskId) {
    document.getElementById('result-video').src = '/api/video/' + currentTaskId;
  }
}

// ═══════════════════════════════════════════════════
// Auto-reconnect
// ═══════════════════════════════════════════════════

async function autoReconnectRunningTask() {
  try {
    const r = await fetch('/api/tasks');
    const d = await r.json();
    const running = (d.tasks || []).find(t => t.status === 'running');
    if (running) {
      currentTaskType = running.task_type || 'creative';
      setRunning(running.task_id);
      currentDirName = running.dir_name || running.task_id;
      showProgress(running.task_id, currentDirName);
      connectWS(running.task_id);
      restoreProgressFromTask(running.task_id);
    }
  } catch(e) {}
}

async function restoreProgressFromTask(taskId) {
  try {
    const r = await fetch('/api/tasks/' + taskId);
    const state = await r.json();
    currentDirName = state.dir_name || taskId;
    currentTaskType = state.task_type || 'creative';

    const steps = getStepsForType(currentTaskType);
    document.getElementById('steps-container').innerHTML = steps.map(s => `
      <div class="step-item flex items-center gap-3 text-sm" data-step="${s.key}">
        <span class="step-icon w-5 h-5 flex items-center justify-center rounded-full bg-gray-800 text-xs">○</span>
        <span class="step-label text-gray-500">${t(s.labelKey)}</span>
      </div>
    `).join('');

    if (state.status === 'completed') {
      document.getElementById('progress-bar').style.width = '100%';
      document.getElementById('progress-pct').textContent = '100%';
      steps.forEach(s => markStepCompleted(s.key));
      showResult(state.final_video_file);
    }
  } catch(e) {}
}

function markStepCompleted(stepKey) {
  const el = document.querySelector(`.step-item[data-step="${stepKey}"]`);
  if (el) {
    el.querySelector('.step-icon').textContent = '✓';
    el.querySelector('.step-icon').className = 'step-icon w-5 h-5 flex items-center justify-center rounded-full bg-green-900 text-green-300 text-xs';
    el.querySelector('.step-label').className = 'step-label text-green-400';
  }
}

async function loadTaskList() {
  const container = document.getElementById('task-list-container');
  try {
    const r = await fetch('/api/tasks');
    const d = await r.json();
    const tasks = d.tasks || [];
    if (!tasks.length) {
      container.innerHTML = '<p class="text-gray-500 text-sm">' + t('noTasks') + '</p>';
      return;
    }
    container.innerHTML = tasks.map(task => {
      const statusColors = { completed: 'text-green-400', running: 'text-yellow-400', failed: 'text-red-400', pending: 'text-gray-400' };
      const statusLabels = { completed: t('statusCompleted'), running: t('statusRunning'), failed: t('statusFailed'), pending: t('statusPending') };
      const typeLabels = { simple: t('typeSimple'), creative: t('typeCreative'), manuscript: t('typeManuscript') };
      const typeColors = { simple: 'bg-blue-900 text-blue-300', creative: 'bg-purple-900 text-purple-300', manuscript: 'bg-orange-900 text-orange-300' };
      const isCompleted = task.status === 'completed';
      const isRunning = task.status === 'running';
      const btnLabel = isCompleted ? t('btnView') : (isRunning ? t('btnViewProgress') : t('btnResume'));
      const btnAction = isCompleted ? `viewTask('${task.task_id}')` : (isRunning ? `viewRunningTask('${task.task_id}')` : `resumeTask('${task.task_id}')`);
      const stopBtn = isRunning ? `<button onclick="stopTaskById('${task.task_id}')" class="text-xs px-3 py-1.5 bg-red-700 hover:bg-red-600 text-red-100 rounded-lg transition">${t('btnStop')}</button>` : '';
      const typeBadge = `<span class="text-xs px-2 py-0.5 rounded-full ${typeColors[task.task_type] || 'bg-gray-800 text-gray-400'}">${typeLabels[task.task_type] || task.task_type}</span>`;
      const desc = task.idea || task.prompt || (task.manuscript_text || '').substring(0, 80);
      const extra = task.scene_count ? ` · ${task.scene_count}${t('sceneUnit')}` : (task.paragraph_count ? ` · ${task.paragraph_count}${t('paraUnit')}` : '');
      return `<div class="bg-gray-900 rounded-xl p-4 border border-gray-800 flex items-center justify-between">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">${typeBadge}<p class="text-sm font-medium truncate">${task.creative_name || task.task_id}</p></div>
          <p class="text-xs text-gray-500 mt-0.5">${task.task_id}${extra}</p>
          ${desc ? `<p class="text-xs text-gray-600 mt-1 truncate max-w-xs">${desc}</p>` : ''}
        </div>
        <div class="flex items-center gap-3 ml-3">
          <span class="text-xs ${statusColors[task.status] || 'text-gray-400'}">${statusLabels[task.status] || task.status}</span>
          <button onclick="${btnAction}" class="text-xs px-3 py-1.5 bg-purple-600 hover:bg-purple-500 rounded-lg transition">${btnLabel}</button>
          ${stopBtn}
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    container.innerHTML = '<p class="text-red-400 text-sm">' + t('loadFailed') + '</p>';
  }
}

async function viewTask(taskId) {
  try {
    const r = await fetch('/api/tasks/' + taskId);
    const state = await r.json();
    currentTaskType = state.task_type || 'creative';
    showTaskDetail(taskId, state);
  } catch(e) { alert(t('failLoad') + ': ' + e.message); }
}

async function viewRunningTask(taskId) {
  try {
    const r = await fetch('/api/tasks/' + taskId);
    const state = await r.json();
    currentTaskType = state.task_type || 'creative';
  } catch(e) { currentTaskType = 'creative'; }
  setRunning(taskId);
  showProgress(taskId, null);
  connectWS(taskId);
  restoreProgressFromTask(taskId);
}

async function resumeTask(taskId) {
  if (isTaskRunning) return showToast(t('taskRunningWarn'));
  try {
    const r = await fetch('/api/tasks/' + taskId + '/resume', { method: 'POST' });
    const d = await r.json();
    if (!d.ok) throw new Error(d.detail || t('failResume'));
    // Determine task type from detail
    try {
      const sr = await fetch('/api/tasks/' + taskId);
      const st = await sr.json();
      currentTaskType = st.task_type || 'creative';
    } catch(e) { currentTaskType = 'creative'; }
    setRunning(taskId);
    currentDirName = d.dir_name;
    showProgress(taskId, d.dir_name);
    connectWS(taskId);
    restoreProgressFromTask(taskId);
    showToast(t('resumed'), 5000);
  } catch(e) { alert(t('failResume') + ': ' + e.message); }
}

async function stopTask() {
  if (!currentTaskId) return;
  if (!confirm(t('stopConfirm'))) return;
  const btn = document.getElementById('btn-stop');
  btn.disabled = true; btn.textContent = t('stopping');
  try {
    const r = await fetch('/api/tasks/' + currentTaskId + '/stop', { method: 'POST' });
    const d = await r.json();
    if (!d.ok) throw new Error(d.detail || t('failStop'));
    showToast(t('stopped'), 4000);
  } catch(e) {
    alert(t('failStop') + ': ' + e.message);
    btn.disabled = false; btn.textContent = t('stopTask');
  }
}

async function stopTaskById(taskId) {
  if (!confirm(t('stopConfirmById'))) return;
  try {
    const r = await fetch('/api/tasks/' + taskId + '/stop', { method: 'POST' });
    const d = await r.json();
    if (!d.ok) throw new Error(d.detail || t('failStop'));
    showToast(t('stoppedById'), 3000);
    loadTaskList();
  } catch(e) { alert(t('failStop') + ': ' + e.message); }
}

// ═══════════════════════════════════════════════════
// Task Detail
// ═══════════════════════════════════════════════════

function showTaskDetail(taskId, state) {
  const panel = document.getElementById('progress-panel');
  panel.classList.remove('hidden');
  document.getElementById('result-area').classList.add('hidden');

  const taskType = state.task_type || 'creative';
  const steps = getStepsForType(taskType);

  // Map step keys to state fields for creative
  const creativeStepMap = {
    image_analysis: 'step_image_analysis', story: 'step_story',
    character_ref: 'step_character_ref', script: 'step_script',
    end_frame_prompts: 'step_end_frame_prompts', end_frame_gen: 'step_end_frame_generation',
    video_gen: 'step_video_generation', audio_subtitle: 'step_audio_subtitle',
    concatenate: 'step_concatenation',
  };
  const manuscriptStepMap = {
    split: 'step_split', scene_prompts: 'step_scene_prompts',
    video_gen: 'step_video_generation', audio_subtitle: 'step_audio_subtitle',
    concatenate: 'step_concatenation',
  };

  const stepsHtml = steps.map(s => {
    let stateField = null;
    if (taskType === 'creative') stateField = creativeStepMap[s.key];
    else if (taskType === 'manuscript') stateField = manuscriptStepMap[s.key];
    const isDone = stateField ? state[stateField] === 'completed' : (s.key === 'init' || s.key === 'submit');
    const icon = isDone ? '✓' : '○';
    const iconClass = isDone ? 'bg-green-900 text-green-300' : 'bg-gray-800 text-xs';
    const labelClass = isDone ? 'text-green-400' : 'text-gray-500';
    return `<div class="step-item flex items-center gap-3 text-sm" data-step="${s.key}">
      <span class="step-icon w-5 h-5 flex items-center justify-center rounded-full ${iconClass} text-xs">${icon}</span>
      <span class="step-label ${labelClass}">${t(s.labelKey)}</span>
    </div>`;
  }).join('');

  document.getElementById('steps-container').innerHTML = stepsHtml;
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-pct').textContent = '100%';

  const typeLabel = { simple: t('typeSimple'), creative: t('typeCreative'), manuscript: t('typeManuscript') };
  let extraInfo = '';
  if (taskType === 'creative') {
    extraInfo = `<p class="text-gray-500">${t('idea_')}: ${(state.idea || '').substring(0, 100)}</p>
      <p class="text-gray-500">${t('sceneCount')}: ${state.scene_count || 0}</p>`;
  } else if (taskType === 'manuscript') {
    extraInfo = `<p class="text-gray-500">${t('paragraphCount')}: ${(state.paragraphs || []).length}</p>`;
  } else {
    extraInfo = `<p class="text-gray-500">Prompt: ${(state.prompt || '').substring(0, 100)}</p>`;
  }

  document.getElementById('progress-message').innerHTML = `
    <div class="space-y-2">
      <p class="text-green-400 font-medium">${t('taskComplete')}</p>
      <p class="text-gray-500">${t('taskId')}: ${taskId} · ${typeLabel[taskType] || taskType}</p>
      <p class="text-gray-500">${t('dir')}: <code class="text-xs bg-gray-800 px-1 py-0.5 rounded font-mono">${state.dir_name || taskId}</code></p>
      ${extraInfo}
      ${state.final_video_file ? `<p class="text-gray-500">${t('artifact')}: <code class="text-xs bg-gray-800 px-1 py-0.5 rounded">${state.final_video_file}</code></p>` : ''}
    </div>`;

  if (state.final_video_file) {
    document.getElementById('result-area').classList.remove('hidden');
    document.getElementById('result-video').src = '/api/video/' + taskId;
  }
}

// ═══════════════════════════════════════════════════
// API Key
// ═══════════════════════════════════════════════════

document.getElementById('apikey-save').onclick = async () => {
  const key = document.getElementById('apikey-input').value.trim();
  if (!key) return alert(t('enterApiKey'));
  const form = new FormData();
  form.append('api_key', key);
  await fetch('/api/config', { method: 'POST', body: form });
  document.getElementById('apikey-input').value = '';
  document.getElementById('apikey-input').placeholder = t('apiKeyMasked');
  document.getElementById('apikey-status').textContent = t('apiKeyConfigured');
  document.getElementById('apikey-status').className = 'text-xs px-2 py-1 rounded-full bg-green-900 text-green-300';
};
